apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require resource limits
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >
      All containers must specify CPU and memory requests and limits
      to prevent resource exhaustion and enable proper scheduling.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: check-container-resources
    exclude:
      resources:
        namespaces:
          - istio-system
          - kyverno
          - kube-system
          - argocd
          - dev
    match:
      any:
        - resources:
            kinds:
              - Pod
    validate:
      message: >
        Container '{{ request.object.metadata.name }}' must specify
        resources.requests and resources.limits for both cpu and memory.
        See helm/SERVICE/values-dev.yaml for examples.
      pattern:
        spec:
          containers:
            - (name): "*"
              resources:
                requests:
                  memory: "?*"
                  cpu:    "?*"
                limits:
                  memory: "?*"
                  cpu:    "?*"